name: Run Zoom Bot

on:  
  repository_dispatch:    
    types: [class-starting-trigger] # The secret knock that wakes up the server  
  workflow_dispatch: 

jobs:  
  run-bot:    
    runs-on: ubuntu-latest    
    steps:    
    - name: Checkout Code      
      uses: actions/checkout@v4    
    
    - name: Set up Python      
      uses: actions/setup-python@v5      
      with:        
        python-version: '3.10'    
    
    - name: Install Dependencies      
      run: |        
        python -m pip install --upgrade pip        
        pip install requests            
    
    - name: Run Cloud Bot      
      env:
        # The left side must match the Python script exactly. 
        # The right side grabs your specific GitHub Secrets.
        TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}        
        TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}        
        PORTAL_COOKIE: ${{ secrets.MY_COOKIE }}      
      run: python cloud_bot.py
