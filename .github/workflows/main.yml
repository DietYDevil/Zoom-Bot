name: Run Zoom Bot

# This section sets the schedule
on:
  schedule:
    # This is UTC time. IST is UTC + 5:30. 
    # To run at 9:25 AM IST, the UTC time is 3:55 AM.
    # The format is: minute hour day month day_of_week
    - cron: '55 3 * * *' 
  workflow_dispatch: # This allows you to click a button to test it manually

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests
        playwright install chromium

    - name: Run the Bot
      run: python bot.py
