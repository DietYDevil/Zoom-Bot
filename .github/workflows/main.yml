name: Run Zoom Bot

on:
  schedule:
    - cron: '0 1-15/2 * * *'
  workflow_dispatch: 

# THIS IS THE NEW PART: It prevents multiple bots from running at the same time
concurrency:
  group: zoom-bot-group
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests
        playwright install --with-deps chromium 

    - name: Run Smart Scheduler
      run: python cloud_bot.py
